{{- if .Values.accounts.enabled -}}
{{- $component := "accounts" -}}
{{- $ctx := dict "context" . "component" $component -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goat.serviceFullname" $ctx }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "goat.serviceLabels" $ctx | nindent 4 }}
spec:
  replicas: {{ .Values.accounts.replicaCount }}
  selector:
    matchLabels:
      {{- include "goat.serviceSelectorLabels" $ctx | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 50%
  template:
    metadata:
      labels:
        {{- include "goat.serviceSelectorLabels" $ctx | nindent 8 }}
        {{- with .Values.accounts.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.accounts.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.accounts.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: accounts
          image: {{ include "goat.image" (dict "image" .Values.accounts.image "global" .Values.global "root" $) }}
          imagePullPolicy: {{ .Values.accounts.image.pullPolicy }}
          {{- with .Values.accounts.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.accounts.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "goat.serviceFullname" $ctx }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "goat.postgresql.secretName" . }}
                  key: {{ include "goat.postgresql.userKey" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "goat.postgresql.secretName" . }}
                  key: {{ include "goat.postgresql.passwordKey" . }}
            {{- with .Values.accounts.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.accounts.livenessProbe.enabled }}
          livenessProbe:
            {{- $lp := omit .Values.accounts.livenessProbe "enabled" }}
            {{- toYaml $lp | nindent 12 }}
          {{- end }}
          {{- if .Values.accounts.readinessProbe.enabled }}
          readinessProbe:
            {{- $rp := omit .Values.accounts.readinessProbe "enabled" }}
            {{- toYaml $rp | nindent 12 }}
          {{- end }}
          {{- with .Values.accounts.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.accounts.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.accounts.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.accounts.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
