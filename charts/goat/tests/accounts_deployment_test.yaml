suite: accounts Deployment
templates:
  - accounts/deployment.yaml
  - accounts/configmap.yaml
tests:
  - it: renders Deployment with default image
    set:
      accounts.enabled: true
      postgresql.external.host: "pg.example.com"
      postgresql.external.existingSecret: "pg-secret"
    template: accounts/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-goat-accounts
      - equal:
          path: spec.replicas
          value: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/plan4better/goat-accounts:.+"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5000
  - it: not rendered when accounts.enabled false
    set:
      accounts.enabled: false
    template: accounts/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0
