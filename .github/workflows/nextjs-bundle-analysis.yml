name: "Next.js bundle analysis"

on:
  workflow_call:
  push:
    branches:
      - main

jobs:
  build:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/production-build.yml
    secrets: inherit
  analyze:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Checkout PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: plan4better/.github/.github/actions/pr-git-checkout@main

      - name: 📥 Monorepo install
        uses: plan4better/.github/.github/actions/pnpm-install@main
        with:
          enable-corepack: true
          cwd: ${{ github.workspace }}
          node_version: 22

      - name: 🏗️ Build
        uses: ./.github/actions/pnpm-cache-build
        with:
          cwd: ${{ github.workspace }}

      - name: 📊 Analyze bundle
        run: |
          cd apps/web
          npx -p nextjs-bundle-analysis@0.5.0 report

      - name: 📤 Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: ${{ github.workspace }}/apps/web/.next/analyze/__bundle_analysis.json

      - name: 📥 Download base branch bundle stats
        uses: dawidd6/action-download-artifact@v6
        if: success() && github.event.number
        with:
          workflow: nextjs-bundle-analysis.yml
          branch: ${{ github.event.pull_request.base.ref }}
          path: ${{ github.workspace }}/apps/web/.next/analyze/base

      # And here's the second place - this runs after we have both the current and
      # base branch bundle stats, and will compare them to determine what changed.
      # There are two configurable arguments that come from package.json:
      #
      # - budget: optional, set a budget (bytes) against which size changes are measured
      #           it's set to 350kb here by default, as informed by the following piece:
      #           https://infrequently.org/2021/03/the-performance-inequality-gap/
      #
      # - red-status-percentage: sets the percent size increase where you get a red
      #                          status indicator, defaults to 20%
      #
      # Either of these arguments can be changed or removed by editing the `nextBundleAnalysis`
      # entry in your package.json file.
      - name: 🔄 Compare with base branch bundle
        if: success() && github.event.number
        run: |
          cd apps/web
          ls -laR .next/analyze/base && npx -p nextjs-bundle-analysis compare

      # Commenting happens in nextjs-bundle-comment.yml (workflow_run), which has
      # write permissions even for fork PRs. This job only exports what it needs.
      - name: 📤 Save PR number for the comment workflow
        if: success() && github.event.number
        run: |
          echo "${{ github.event.number }}" > apps/web/.next/analyze/__pr_number

      - name: 📤 Upload comment artifact
        if: success() && github.event.number
        uses: actions/upload-artifact@v4
        with:
          name: bundle-comment
          path: |
            ${{ github.workspace }}/apps/web/.next/analyze/__bundle_analysis_comment.txt
            ${{ github.workspace }}/apps/web/.next/analyze/__pr_number
