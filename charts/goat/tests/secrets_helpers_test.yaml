suite: secret resolution helpers
templates:
  - core/deployment.yaml
tests:
  - it: postgresql external — uses provided existingSecret
    set:
      core.enabled: true
      postgresql.operator.enabled: false
      postgresql.cluster.enabled: false
      postgresql.external.host: "postgres.example.svc.cluster.local"
      postgresql.external.existingSecret: "goat-pg-creds"
      postgresql.external.existingSecretUserKey: "username"
      postgresql.external.existingSecretPasswordKey: "password"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: goat-pg-creds
                key: username
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: goat-pg-creds
                key: password

  - it: postgresql bundled — uses CNPG cluster-app secret naming
    set:
      core.enabled: true
      postgresql.operator.enabled: true
      postgresql.cluster.enabled: true
      postgresql.cluster.instances: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-goat-pg-app
                key: username
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-goat-pg-app
                key: password

  - it: postgresql disabled + no external → fails install with clear message
    set:
      core.enabled: true
      postgresql.operator.enabled: false
      postgresql.cluster.enabled: false
      postgresql.external.host: ""
      postgresql.external.existingSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "postgresql.external.existingSecret is required when postgresql.cluster.enabled is false"
