suite: core Service
templates:
  - core/service.yaml
tests:
  - it: renders Service with default ports
    set:
      core.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-goat-core
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http
  - it: not rendered when core disabled
    set:
      core.enabled: false
    asserts:
      - hasDocuments:
          count: 0
