# CI fixture: fully bundled profile.
# - Postgres deployed in-cluster via CloudNativePG operator + Cluster CR
# - Bundled Redis
# - Public-facing Ingress with TLS via cert-manager

global:
  storageClass: longhorn
  imagePullSecrets:
    - name: ghcr-pull

core:
  enabled: true
  replicaCount: 3
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: api.goat.example.com
        paths:
          - path: /api/v2
            pathType: Prefix
    tls:
      - secretName: goat-api-tls
        hosts: [api.goat.example.com]

postgresql:
  operator:
    enabled: true
  cluster:
    enabled: true
    instances: 3
    storage:
      size: 200Gi
      storageClass: longhorn

redis:
  enabled: true
