name: "PR"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  # Key on PR number, not head_ref: fork branches often share names (several
  # contributors PR from their fork's `main`), and equal groups would cancel
  # each other's CI.
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  file-changes:
    name: file-changes
    uses: ./.github/workflows/checks.yml
    secrets: inherit

  lint:
    name: lint
    needs: file-changes
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    with:
      web: ${{ needs.file-changes.outputs.web == 'true' }}
      python: >-
        ${{ needs.file-changes.outputs.core == 'true'
        || needs.file-changes.outputs.geoapi == 'true'
        || needs.file-changes.outputs.processes == 'true' }}

  test:
    name: test
    needs: file-changes
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      web: ${{ needs.file-changes.outputs.web == 'true' }}
      core: ${{ needs.file-changes.outputs.core == 'true' }}
      # goatlib is a shared lib; run its suite on any python-package change.
      goatlib: >-
        ${{ needs.file-changes.outputs.core == 'true'
        || needs.file-changes.outputs.geoapi == 'true'
        || needs.file-changes.outputs.processes == 'true' }}
      geoapi: ${{ needs.file-changes.outputs.geoapi == 'true' }}
      processes: ${{ needs.file-changes.outputs.processes == 'true' }}

  build:
    name: build
    needs: file-changes
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      web: >-
        ${{ needs.file-changes.outputs.web == 'true'
        || needs.file-changes.outputs.storybook == 'true' }}
      keycloak-theme: ${{ needs.file-changes.outputs.keycloak-theme == 'true' }}

  analyze:
    name: analyze
    needs: [file-changes, build]
    if: ${{ needs.file-changes.outputs.web == 'true' || needs.file-changes.outputs.storybook == 'true' }}
    uses: ./.github/workflows/nextjs-bundle-analysis.yml
    secrets: inherit

  required:
    needs: [lint, test, build, analyze]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Fail only on real failures/cancellations. `skipped` is expected and OK:
      # change-detection legitimately skips jobs for unaffected areas (e.g.
      # build-goat on a core-only PR). Advisory jobs use continue-on-error so
      # they report success and never reach here.
      - name: fail if required jobs failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
