name: "Lint"
on:
  workflow_call:
    inputs:
      web:
        type: boolean
        description: "Whether to run web linting"
        required: false
        default: true

      python:
        type: boolean
        description: "Whether to run python linting"
        required: false
        default: true

jobs:
  web:
    # REQUIRED. lint-web.sh runs `tsc --noEmit` (typecheck) + eslint.
    runs-on: ubuntu-latest
    if: ${{ inputs.web }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main

      - name: 📥 Monorepo install
        uses: plan4better/.github/.github/actions/pnpm-install@main
        with:
          enable-corepack: true
          cwd: ${{ github.workspace }}
          node_version: 22

      - name: 🔬 Run linting
        run: bash ${{ github.workspace }}/scripts/lint-web.sh

      - name: 🔬 Annotate Code Linting Results
        uses: ataylorme/eslint-annotate-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          report-json: ${{ github.workspace }}/lint-results/eslint_report.json
          only-pr-files: false

      - name: 🔬 Upload ESLint report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: ${{ github.workspace }}/lint-results

  python:
    runs-on: ubuntu-latest
    if: ${{ inputs.python }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main

      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.2"
          enable-cache: true

      # gdal is sdist-only and needs libgdal to build; ruff/mypy don't need
      # it installed.
      - name: 🐍 Install Dependencies
        run: uv sync --frozen --all-packages --all-extras --no-install-package gdal
        working-directory: ${{ github.workspace }}

      # REQUIRED: ruff lint on the packages that are clean. Keeps them clean and
      # blocks regressions. (Not goatlib — it still carries ruff debt — and not
      # `ruff format --check`, which is currently dirty repo-wide.)
      # --no-sync: a bare `uv run` re-syncs and would pull gdal back in.
      - name: 🔬 ruff check (clean packages, required)
        run: >-
          uv run --no-sync ruff check
          apps/core apps/geoapi apps/processes packages/python/goatobs
        working-directory: ${{ github.workspace }}

      # ADVISORY: full gate (mypy --strict + repo-wide ruff check + ruff format
      # --check). Currently red on pre-existing debt — reports but does not
      # block. Remove `continue-on-error` once the debt is cleared.
      - name: 🔬 Full lint (mypy + ruff + format, advisory)
        continue-on-error: true
        run: uv run --no-sync bash scripts/lint-python.sh
        working-directory: ${{ github.workspace }}
