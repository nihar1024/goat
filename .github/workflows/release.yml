name: "Release"

on:
  release:
    types: [published]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  file-changes:
    name: file-changes
    uses: ./.github/workflows/checks.yml
    secrets: inherit

  lint:
    name: lint
    needs: file-changes
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    with:
      web: true
      python: false

  # Gate releases on the test suites. Change-detection picks the affected
  # suites on branch pushes; tag releases run everything (same override the
  # release jobs use). Advisory suites report green and never block.
  test:
    name: test
    needs: file-changes
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      web: >-
        ${{ needs.file-changes.outputs.web == 'true'
        || startsWith(github.ref, 'refs/tags/v') }}
      core: >-
        ${{ needs.file-changes.outputs.core == 'true'
        || startsWith(github.ref, 'refs/tags/v') }}
      goatlib: >-
        ${{ needs.file-changes.outputs.core == 'true'
        || needs.file-changes.outputs.geoapi == 'true'
        || needs.file-changes.outputs.processes == 'true'
        || startsWith(github.ref, 'refs/tags/v') }}
      geoapi: >-
        ${{ needs.file-changes.outputs.geoapi == 'true'
        || startsWith(github.ref, 'refs/tags/v') }}
      processes: >-
        ${{ needs.file-changes.outputs.processes == 'true'
        || startsWith(github.ref, 'refs/tags/v') }}

  release-docker-web:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.web == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/web/Dockerfile
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/web

  release-docker-core:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.core == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/core/Dockerfile
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/core

  release-docker-geoapi:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.geoapi == 'true' ||
      startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/geoapi/Dockerfile
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/geoapi

  release-docker-processes:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.processes == 'true' ||
      startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/processes/Dockerfile
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/processes

  release-docker-storybook:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.storybook == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/storybook/Dockerfile
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/storybook

  release-docker-docs:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.docs == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/docs/Dockerfile
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/docs

  release-keycloak-theme:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.keycloak-theme == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/keycloak-build.yml
    secrets: inherit
    with:
      keycloak-theme-artifact-id: "p4b-keyclok-theme-${{ needs.file-changes.outputs.sha-short}}"
      push: true

  # Windmill images - server and workers
  release-docker-windmill-server:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.processes == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/processes/workers/Dockerfile
      target: server
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/windmill-server

  release-docker-windmill-worker-default:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.processes == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/processes/workers/Dockerfile
      target: worker-default
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/windmill-worker-default

  release-docker-windmill-worker-tools:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.processes == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/processes/workers/Dockerfile
      target: worker-tools
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/windmill-worker-tools

  release-docker-windmill-worker-print:
    needs: [file-changes, lint, test]
    if: needs.file-changes.outputs.processes == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable-docker-build.yml
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      dockerhub-enable: false
      ghcr-enable: true
      push: ${{ github.event_name != 'pull_request' }}
      file: ./apps/processes/workers/Dockerfile
      target: worker-print
      platforms: linux/amd64
      image-name: ghcr.io/${{ github.repository }}/windmill-worker-print
