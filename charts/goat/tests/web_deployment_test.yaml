suite: web Deployment
templates:
  - web/deployment.yaml
  - web/configmap.yaml
tests:
  - it: renders Deployment with default image
    set:
      web.enabled: true
      postgresql.external.host: "pg.example.com"
      postgresql.external.existingSecret: "pg-secret"
    template: web/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-goat-web
      - equal:
          path: spec.replicas
          value: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/plan4better/goat/web:.+"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000
  - it: not rendered when web.enabled false
    set:
      web.enabled: false
    template: web/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0
