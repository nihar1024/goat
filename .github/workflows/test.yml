name: "Test"

# Reusable test workflow. Driven by the change-detection booleans from
# checks.yml so only affected areas run. Jobs that are not yet green on a clean
# tree are marked `continue-on-error: true` (ADVISORY) — they run and report but
# do not block the merge. Promote them to required (drop continue-on-error) as
# each suite goes green.

on:
  workflow_call:
    inputs:
      web:
        type: boolean
        default: false
      core:
        type: boolean
        default: false
      goatlib:
        type: boolean
        default: false
      geoapi:
        type: boolean
        default: false
      processes:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  web:
    name: web (vitest)
    if: ${{ inputs.web }}
    runs-on: ubuntu-latest
    # REQUIRED. vitest suite is green (202 tests).
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main
      - name: 📥 Monorepo install
        uses: plan4better/.github/.github/actions/pnpm-install@main
        with:
          enable-corepack: true
          cwd: ${{ github.workspace }}
          node_version: 22
      - name: 💾 Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: 📥 Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: 🧪 Vitest
        run: pnpm --filter web exec vitest run

  core:
    name: core (pytest)
    if: ${{ inputs.core }}
    runs-on: ubuntu-latest
    # REQUIRED. The 100-test suite passes against PostGIS alone: it self-
    # bootstraps schemas (DROP/CREATE + metadata.create_all in the session
    # fixture), the asset tests are pure-unit, and external services (S3, DNS,
    # Caddy) are mocked/faked — no MinIO or network needed.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rds
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goat
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_USER: rds
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goat
      POSTGRES_PORT: "5432"
      AUTH: "False"
      ENVIRONMENT: test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main
      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.2"
          enable-cache: true
      # gdal is sdist-only and needs libgdal to build; only goatlib's WFS/
      # converter paths import it (lazily), so this suite runs without it.
      - name: 🐍 Install dependencies
        run: uv sync --frozen --all-packages --all-extras --no-install-package gdal
      # --no-sync: a bare `uv run` re-syncs and would pull gdal back in.
      - name: 🧪 pytest
        run: uv run --no-sync pytest tests/
        working-directory: apps/core

  goatlib:
    name: goatlib (pytest)
    if: ${{ inputs.goatlib }}
    runs-on: ubuntu-latest
    # REQUIRED. Data-dependent tests skip when their fixtures are absent;
    # travel-time matrices auto-download from assets.plan4better.de.
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main
      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.2"
          enable-cache: true
      # Only suite that needs real gdal (WFS/converter tests). The compiled
      # wheel lands in the uv cache, so the source build runs once per
      # lockfile change, not per run.
      - name: 🌍 Install libgdal-dev
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libgdal-dev
      - name: 🐍 Install dependencies
        run: uv sync --frozen --all-packages --all-extras
      - name: 🧪 pytest (unit)
        run: uv run --no-sync pytest tests/unit
        working-directory: packages/python/goatlib

  geoapi:
    name: geoapi (pytest)
    if: ${{ inputs.geoapi }}
    runs-on: ubuntu-latest
    # REQUIRED. Suite is fully mocked (DuckLake/Postgres) — no services needed.
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main
      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.2"
          enable-cache: true
      - name: 🐍 Install dependencies
        run: uv sync --frozen --all-packages --all-extras --no-install-package gdal
      - name: 🧪 pytest
        run: uv run --no-sync pytest tests/
        working-directory: apps/geoapi

  processes:
    name: processes (pytest)
    if: ${{ inputs.processes }}
    runs-on: ubuntu-latest
    # REQUIRED. Suite is fully mocked (Windmill/DB) — no services needed.
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📥 Checkout PR
        uses: plan4better/.github/.github/actions/pr-git-checkout@main
      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.2"
          enable-cache: true
      - name: 🐍 Install dependencies
        run: uv sync --frozen --all-packages --all-extras --no-install-package gdal
      - name: 🧪 pytest
        run: uv run --no-sync pytest tests/
        working-directory: apps/processes
