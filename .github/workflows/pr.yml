name: "PR"

on:
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  file-changes:
    name: file-changes
    uses: ./.github/workflows/checks.yml
    secrets: inherit

  pr-base:
    name: pr-base
    # PR-only: this posts PR comments and has no meaning on a push to main.
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
    uses: "plan4better/.github/.github/workflows/reusable-pr-base.yml@main"
    permissions:
      contents: none
      issues: read
      pull-requests: write
    secrets: inherit

  lint:
    name: lint
    needs: file-changes
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    with:
      web: ${{ needs.file-changes.outputs.web == 'true' }}
      python: >-
        ${{ needs.file-changes.outputs.core == 'true'
        || needs.file-changes.outputs.geoapi == 'true'
        || needs.file-changes.outputs.processes == 'true' }}

  test:
    name: test
    needs: file-changes
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      web: ${{ needs.file-changes.outputs.web == 'true' }}
      core: ${{ needs.file-changes.outputs.core == 'true' }}
      # goatlib is a shared lib; run its suite on any python-package change.
      goatlib: >-
        ${{ needs.file-changes.outputs.core == 'true'
        || needs.file-changes.outputs.geoapi == 'true'
        || needs.file-changes.outputs.processes == 'true' }}
      geoapi: ${{ needs.file-changes.outputs.geoapi == 'true' }}
      processes: ${{ needs.file-changes.outputs.processes == 'true' }}

  build-goat:
    name: build
    needs: file-changes
    if: ${{ needs.file-changes.outputs.web == 'true' || needs.file-changes.outputs.storybook == 'true' }}
    uses: ./.github/workflows/production-build.yml
    secrets: inherit

  analyze-goat:
    name: analyze-goat
    needs: build-goat
    uses: ./.github/workflows/nextjs-bundle-analysis.yml
    secrets: inherit

  build-keycloak:
    name: build-keycloak
    needs: file-changes
    if: ${{ needs.file-changes.outputs.keycloak-theme == 'true' }}
    uses: ./.github/workflows/keycloak-build.yml

  required:
    needs: [lint, test, build-goat, analyze-goat, build-keycloak]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Fail only on real failures/cancellations. `skipped` is expected and OK:
      # change-detection legitimately skips jobs for unaffected areas (e.g.
      # build-goat on a core-only PR). Advisory jobs use continue-on-error so
      # they report success and never reach here.
      - name: fail if required jobs failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
