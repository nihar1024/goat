suite: processes Deployment
templates:
  - processes/deployment.yaml
  - processes/configmap.yaml
tests:
  - it: renders Deployment with default image
    set:
      processes.enabled: true
      postgresql.external.host: "pg.example.com"
      postgresql.external.existingSecret: "pg-secret"
    template: processes/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-goat-processes
      - equal:
          path: spec.replicas
          value: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/plan4better/goat/processes:.+"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8000
  - it: not rendered when processes.enabled false
    set:
      processes.enabled: false
    template: processes/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0
