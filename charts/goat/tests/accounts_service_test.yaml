suite: accounts Service
templates:
  - accounts/service.yaml
tests:
  - it: renders Service with default ports
    set:
      accounts.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-goat-accounts
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http
  - it: not rendered when accounts disabled
    set:
      accounts.enabled: false
    asserts:
      - hasDocuments:
          count: 0
